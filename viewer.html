<!DOCTYPE html>
<html>
<head>

<title>PDF Viewer</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

.header{
background:#222;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
background:#667eea;
color:white;
}

iframe{
width:100%;
height:90vh;
border:none;
}

</style>

</head>

<body>

<div class="header">

<h3>📄 PDF Viewer</h3>

<div>
<button onclick="download()">Download</button>
<button onclick="goBack()">Back</button>
</div>

</div>

<iframe id="viewer"></iframe>

<script>

const params = new URLSearchParams(window.location.search)

const file = params.get("file")

document.getElementById("viewer").src = file

function download(){
window.open(file)
}

function goBack(){
history.back()
}

</script>

</body>
</html>

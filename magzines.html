<!DOCTYPE html>
<html>

<head>
<title>BVRITH Magazines</title>

<style>
body{
  font-family: Arial;
  background-image: url('background.jpg'); /* 👈 change here */
  background-repeat: no-repeat;
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  text-align:center;
  color:white;
  min-height:100vh;
  margin:0;
}

/* dark overlay */
body::before{
  content:"";
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.6);
  z-index:-1;
}

h1{
  margin-top:40px;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
}

.container{
  margin-top:40px;
}

/* card */
.card{
  background:white;
  color:black;
  width:300px;
  display:inline-block;
  margin:20px;
  padding:20px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

/* buttons */
button{
  padding:10px 15px;
  margin:10px 5px 0 5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

.view{
  background:#4CAF50;
  color:white;
}

.view:hover{
  background:#45a049;
}

.download{
  background:#2196F3;
  color:white;
}

.download:hover{
  background:#1976D2;
}

.back{
  position:absolute;
  left:20px;
  top:20px;
  background:white;
  color:black;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.back:hover{
  background:#f0f0f0;
}
</style>
</head>

<body>

<button class="back" onclick="goBack()">⬅ Back</button>

<h1>BVRITH Magazines</h1>

<div class="container" id="magazineList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBY7KexBKJcReNcTO7lUczpLVEe4LwFEUU",
  authDomain: "bvrith-digital-library-88e59.firebaseapp.com",
  projectId: "bvrith-digital-library-88e59",
  storageBucket: "bvrith-digital-library-88e59.firebasestorage.app",
  messagingSenderId: "326379487329",
  appId: "1:326379487329:web:3fb389d1845ec7ec4bea20"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const querySnapshot = await getDocs(collection(db,"magzines"));
const container = document.getElementById("magazineList");

querySnapshot.forEach((doc)=>{
  const data = doc.data();

  container.innerHTML += `
    <div class="card">
      <h3>${data.title}</h3>
      <p><b>Month:</b> ${data.pdf_month}</p>
      <p><b>Year:</b> ${data.pdf_year}</p>
      <p><b>Volume:</b> ${data.volume}</p>
      <p><b>Issue:</b> ${data.issue}</p>

      <a href="${data.pdf_url}" target="_blank">
        <button class="view">View Online</button>
      </a>

      <a href="${data.pdf_url}" download>
        <button class="download">Download</button>
      </a>
    </div>
  `;
});
</script>

<script>
function goBack(){
  window.location.href="index.html";
}
</script>

</body>
</html>
